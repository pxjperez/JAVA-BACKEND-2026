# Configuración de la base de datos
## URL de la clase del driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
## Cadena de conexión
spring.datasource.url=jdbc:mysql://localhost:3306/matricula
## Usuario de la BD
spring.datasource.username=root
## Password de la BD
spring.datasource.password=082022fF
# Configuración de JPA/Hibernate
## Motor de BD utilizado
spring.jpa.database=mysql
## Habilitar la ejecución de sentencias DDL automaticas
spring.jpa.hibernate.ddl-auto=none
## Habilitar que se muestre en consola la ejecución de sentencias SQL
spring.jpa.show-sql=false
## Habilitar en que formato se mostrarán las sentencias SQL
spring.jpa.properties.hibernate.format_sql=true

# Configuración Swagger
# Especifica la ruta donde se publicaran la documentacion del api
springdoc.api-docs.path=/api-docs
# Especifica la ruta donde se publicara la interfaz de usuario de Swagger
springdoc.swagger-ui.path=/
# Especifica la activación de las interfaces de usuario
springdoc.swagger-ui.enabled=true
# Cambiar el titulo de la pagina principal
#Confguracion para ordernar los endpoints method  # Orden por metodo | alpha  # Orden alfabético de la url
springdoc.swagger-ui.operationsSorter=method
#Configuracion de la informacion de la API
springdoc.open-api.info.title=TITULO DE MI API
springdoc.open-api.info.description=DESCRIPCION DE MI API
springdoc.open-api.info.version=1.0
springdoc.open-api.info.contact.name=JUAN CARLOS PEREZ GIL
springdoc.open-api.info.contact.email=JPEREZGIL@OUTLOOK.COM
springdoc.open-api.info.contact.url=https://www.linkedin.com/in/jperezgi
springdoc.open-api.info.license.name=LICENCIA DE MI API
springdoc.open-api.info.license.url=URL LICENCIA DE MI API

##Eureka client
##Indicar el nombre de la aplicacion para el registro en Eureka
spring.application.name=apimatricula
##Indicar el puerto donde se ejecutara la aplicacion
server.port=8081
##Indicar la url del servidor Eureka para el registro de servicios
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
#Indicar el Hostname donde esta la aplicacion
eureka.instance.hostname=localhost
##Personalizar el id de la instancia 
eureka.instance.instance-id=${eureka.instance.hostname}:${spring.application.name}:${server.port}
