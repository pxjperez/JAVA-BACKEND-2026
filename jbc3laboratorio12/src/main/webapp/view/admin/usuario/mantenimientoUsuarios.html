<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <title>MANTENIMIENTO USUARIOS</title>
        <link rel="stylesheet" type="text/css" href="static/css/estilos.css">
    </head>
    <body>
        <div class="container">
            <h1>MANTENIMIENTO USUARIOS</h1>
            <form th:action="@{'buscarUsuario'}" method="get">
                <label>Buscar por User:</label>
                <input type="text" name="user" />
                <input type="submit" value="Buscar" />
            </form>
            <br>
            <table border="1">
                <thead>
                    <tr>
                        <th>ID USUARIO</th>
                        <th>NOMBRES COMPLETOS</th>
                        <th>USER</th>
                        <th>FOTO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="usuario : ${listaUsuarios}">
                        <td th:text="${usuario.idUsuario}"></td>
                        <td th:text="${usuario.nombreCompleto}"></td>
                        <td th:text="${usuario.user}"></td>
                        <td>
                            <img th:if="${usuario.foto != null}" width="50px" height="50px" th:src="@{${usuario.fotoString}} " alt="Sin foto" /> 
                            <label th:if="${usuario.foto == null}">Sin foto</label>
                        </td>
                        <td>
                            <a th:href="@{'elinarUsuario?idUsuario=' + ${usuario.idUsuario} }">E</a> - 
                            <a th:href="@{'formularioActualizarUsuario?idUsuario=' + ${usuario.idUsuario} }">A</a>
                        </td>
                    </tr>
                </tbody>
            </table>
            <label style="color: red" th:text="${msgError}"></label>
            <label style="color: blue" th:text="${msgExito}"></label>
            <h3><a th:href="@{'formularioNuevoUsuario'}" class="logout-button">Nuevo Usuario</a></h3>
        </div>
    </body>
</html>
