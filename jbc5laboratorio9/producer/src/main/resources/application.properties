spring.application.name=producer


# Configuración de la base de datos
## URL de la clase del driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
## Cadena de conexión
spring.datasource.url=jdbc:mysql://localhost:3306/matricula
## Usuario de la BD
spring.datasource.username=root
## Password de la BD
spring.datasource.password=root
# Configuración de JPA/Hibernate
## Motor de BD utilizado
spring.jpa.database=mysql
## Habilitar la ejecución de sentencias DDL automaticas
spring.jpa.hibernate.ddl-auto=none
## Habilitar que se muestre en consola la ejecución de sentencias SQL
spring.jpa.show-sql=false
## Habilitar en que formato se mostrarán las sentencias SQL
spring.jpa.properties.hibernate.format_sql=true

#Propiedades del productor kafka
##Configura la url de Kafka
spring.kafka.bootstrap-servers=localhost:9092
##Configura el grupo de consumidores
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.topico.nombre=curso-topico