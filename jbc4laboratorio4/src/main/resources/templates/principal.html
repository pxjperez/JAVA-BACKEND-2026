<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principal - Sistema de Matrícula</title>
    <!-- Bootstrap CSS -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="css/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <h1 class="text-center mb-4"><i class="bi bi-house"></i> Bienvenido al Sistema de Matrícula</h1>
                        <p class="text-center" th:text="${mensajeBienvenida}"></p>
                        <p class="text-center" th:text="${usuario.nombreCompleto}"></p>
                        <div class="text-center mt-3">
                            <a href="/logout" class="btn btn-danger"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- jQuery -->
    <script src="js/jquery-4.0.0.min.js"></script>
    <!-- Bootstrap JS -->    
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>    
</body>
</html>
