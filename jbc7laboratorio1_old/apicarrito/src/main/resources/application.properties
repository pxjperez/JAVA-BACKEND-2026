spring.application.name=apicarrito
server.port=8081

##CONFIGURACIONES DEL DATASOURCE
spring.datasource.url=jdbc:mysql://localhost:3306/carrito
spring.datasource.username=root
spring.datasource.password=root
# URL del driver es opcional, Spring Boot puede detectarlo automáticamente a partir de la URL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

##CONFIGURACIONES DEL JPA
spring.jpa.database=MYSQL
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

## CONFIGURACIONES DE SWAGGER
# Especifica la ruta donde se publicaran la documentacion del api
springdoc.api-docs.path=/api-docs
# Especifica la ruta donde se publicara la interfaz de usuario de Swagger
springdoc.swagger-ui.path=/
# Especifica la activación de las interfaces de usuario
springdoc.swagger-ui.enabled=true
# Cambiar el titulo de la pagina principal
#Confguracion para ordernar los endpoints method  # Orden por metodo | alpha  # Orden alfabético de la url
springdoc.swagger-ui.operationsSorter=method
#Configuracion de la informacion de la API
springdoc.open-api.info.title=TITULO DE MI API
springdoc.open-api.info.description=DESCRIPCION DE MI API
springdoc.open-api.info.version=1.0
springdoc.open-api.info.contact.name=JUAN CARLOS PEREZ GIL
springdoc.open-api.info.contact.email=JPEREZGIL@OUTLOOK.COM
springdoc.open-api.info.contact.url=https://www.linkedin.com/in/jperezgi
springdoc.open-api.info.license.name=LICENCIA DE MI API
springdoc.open-api.info.license.url=URL LICENCIA DE MI API

##CONFIGURACIONES DE EUREKA CLIENT
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
#Fuerzo para reconosca los el HOST y el INSTANCE-ID
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false